  '@amap/amap-jsapi-loader': ^1.0.1
  '@element-plus/icons-vue': ^2.3.2
  '@floating-ui/vue': ^2.0.1
  '@vueuse/core': ^14.3.0
  browser-image-compression: ^2.0.2
