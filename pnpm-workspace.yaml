packages:
  - apps/*
  - packages/*

catalog:
  # dependencies
  '@element-plus/icons-vue': ^2.3.2
  '@vueuse/core': ^14.3.0
  dayjs: ^1.11.21
  element-plus: ^2.14.1
  lodash-unified: ^1.0.3
  markdown-it: ^14.2.0
  pinia: ^3.0.4
  vue: ^3.5.35
  vue-router: ^4.6.4
  # devDependencies
  '@types/node': ^25.9.2
  '@vitejs/plugin-vue': ^6.0.7
  '@vue/tsconfig': ^0.9.1
  sass-embedded: ^1.100.0
  typescript: ^6.0.3
  unplugin-auto-import: ^21.0.0
  unplugin-vue-components: ^32.1.0
  vite: ^8.0.16
  vue-tsc: ^3.3.4

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@prisma/engines': true
  '@swc/core': true
  better-sqlite3: true
  bufferutil: true
  esbuild: true
  libpq: false # 有问题，暂不构建
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  sqlite3: true
  unrs-resolver: true
  utf-8-validate: true
