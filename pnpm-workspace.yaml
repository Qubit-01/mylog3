  dayjs: ^1.11.21
  element-plus: ^2.14.3
  lodash-unified: ^1.0.3
  markdown-it: ^14.3.0
  openapi-fetch: ^0.17.0
  pinia: ^3.0.4
  swiper: ^14.0.5
  vue: ^3.5.39
  vue-router: ^5.1.0
  # devDependencies
  '@amap/amap-jsapi-types': ^0.0.15
